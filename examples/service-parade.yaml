# Example catalog for two existing local clones.
repos:
  - id: billing
    path: ../billing
    defaultBranch: main
    owner: payments
    httpDiscovery:
      sdkPackages:
        - Acme.Identity.Contracts
  - id: identity
    path: ../identity
    defaultBranch: main
    owner: platform

services:
  - id: billing-api
    repoId: billing
    root: services/api
    language: typescript
    tags: [billing, api]
    aliases: [billing, billing-api]
    baseUrls: [http://billing-api]
  - id: identity-api
    repoId: identity
    root: .
    language: go
    tags: [identity, accounts]
    aliases: [identity, identity-api]
    baseUrls: [http://identity-api]

sdkSources:
  - id: identity-contract-clients
    packages: [Acme.Identity.Contracts, Acme.Identity.Contracts.Clients]
    source: ../identity/contracts
    targetServiceId: identity-api
    detector: mozu-service-client
    options:
      clientDir: Clients
      codegenTargets: CCG.targets

commands:
  - name: test
    run: npm test
    scope: service
    serviceId: billing-api
  - name: test
    run: go test ./...
    scope: service
    serviceId: identity-api
